EXTENDS:
  - https://raw.githubusercontent.com/hardisgroupcom/sfdx-hardis/main/config/sfdx-hardis.mega-linter-config.yml

# --- overrides locais para destravar o pipeline ---
DISABLE_ERRORS: true           # não falha o job do linter
APPLY_FIXES: none
PRINT_ALPACA: false

DISABLE:                       # desliga temporariamente linters que estão quebrando no seu runner
  - SALESFORCE_SFDX_SCANNER_APEX
  - SALESFORCE_SFDX_SCANNER_AURA
  - SALESFORCE_SFDX_SCANNER_LWC
  - SALESFORCE_CODE_ANALYZER_APEX
  - YAML_PRETTIER
  - JSON_PRETTIER

